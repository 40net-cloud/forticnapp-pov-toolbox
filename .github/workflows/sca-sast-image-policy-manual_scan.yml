name: FortiCNAPP SCA + DockerHub + Image Policy Manual Scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secure-build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # STEP 1 - Checkout code
      # Purpose:
      #   Pull the source code into the GitHub runner.
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # ------------------------------------------------------------
      # STEP 2 - Install & authenticate FortiCNAPP CLI
      # Purpose:
      #   Install the CLI and configure it for SCA/SAST scanning.
      # Notes:
      #   - This authentication is only for CLI-based scanning.
      #   - The inline scanner later uses a different auth method.
      # ------------------------------------------------------------
      - name: Install FortiCNAPP CLI
        run: |
          curl -sSL https://raw.githubusercontent.com/lacework/go-sdk/main/cli/install.sh | bash
          lacework configure \
            -a ${{ secrets.LW_ACCOUNT_NAME }}.lacework.net \
            -k ${{ secrets.LW_API_KEY }} \
            -s ${{ secrets.LW_API_SECRET }} \
            --noninteractive
          lacework component install sca

      # ------------------------------------------------------------
      # STEP 3 - Run SCA/SAST and upload results
      # Purpose:
      #   Scan source code and dependencies, then upload results to
      #   FortiCNAPP UI.
      # Notes:
      #   - This step does NOT block the pipeline.
      #   - Findings are still visible in FortiCNAPP.
      # ------------------------------------------------------------
      - name: Run SCA scan
        run: |
          mkdir -p lacework-reports
          lacework sca scan . \
            -f sarif \
            -o lacework-reports/scan.sarif.json \
            --save-results

      # ------------------------------------------------------------
      # STEP 4 - Build Java app
      # Purpose:
      #   Compile and package the vulnerable Java lab into a JAR.
      # ------------------------------------------------------------
      - name: Build Java app with Maven
        working-directory: cicd/vuln-java-lab
        run: |
          mvn -B clean package -DskipTests

      # ------------------------------------------------------------
      # STEP 5 - Docker login
      # Purpose:
      #   Authenticate to Docker Hub so the image can be pushed.
      # ------------------------------------------------------------
      - name: Docker login
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin

      # ------------------------------------------------------------
      # STEP 6 - Build Docker image
      # Purpose:
      #   Build the image from the app Dockerfile.
      # ------------------------------------------------------------
      - name: Build Docker image
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_NAME: hello-app
          IMAGE_TAG: latest
        working-directory: cicd/vuln-java-lab
        run: |
          docker build -t $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG .

      # ------------------------------------------------------------
      # STEP 7 - Inline scan Docker image (pre-push)
      # Purpose:
      #   Evaluate the built image against FortiCNAPP CI/CD image
      #   policies before pushing it.
      # Notes:
      #   - This is the stage where policy-based blocking happens.
      #   - If FortiCNAPP UI says a policy action is "Block", this
      #     step can fail and stop the workflow.
      # ------------------------------------------------------------
      - name: Inline scan Docker image (pre-push)
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_NAME: hello-app
          IMAGE_TAG: latest
        run: |
          docker pull lacework/lacework-inline-scanner:latest
          docker run --rm \
            -e LW_ACCOUNT_NAME=${{ secrets.LW_ACCOUNT_NAME }} \
            -e LW_ACCESS_TOKEN=${{ secrets.LW_ACCESS_TOKEN }} \
            -e LW_SCANNER_SAVE_RESULTS=true \
            -v /var/run/docker.sock:/var/run/docker.sock \
            lacework/lacework-inline-scanner:latest \
            image evaluate $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG \
            --build-id $GITHUB_RUN_ID \
            --build-plan github-actions \
            --save

      # ------------------------------------------------------------
      # STEP 8 - Push Docker image
      # Purpose:
      #   Push the image only if the pre-push inline scan passed.
      # ------------------------------------------------------------
      - name: Push Docker image
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_NAME: hello-app
          IMAGE_TAG: latest
        run: |
          docker push $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG

      # ------------------------------------------------------------
      # STEP 9 - Remove local image
      # Purpose:
      #   Remove the local image so the next scan pulls from Docker Hub.
      # ------------------------------------------------------------
      - name: Remove local image
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_NAME: hello-app
          IMAGE_TAG: latest
        run: |
          docker rmi $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG || true

      # ------------------------------------------------------------
      # STEP 10 - Inline scan Docker image (post-push)
      # Purpose:
      #   Scan the image again after push, from the registry side.
      # ------------------------------------------------------------
      - name: Inline scan Docker image (post-push)
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_NAME: hello-app
          IMAGE_TAG: latest
        run: |
          docker pull lacework/lacework-inline-scanner:latest
          docker run --rm \
            -e LW_ACCOUNT_NAME=${{ secrets.LW_ACCOUNT_NAME }} \
            -e LW_ACCESS_TOKEN=${{ secrets.LW_ACCESS_TOKEN }} \
            -e LW_SCANNER_SAVE_RESULTS=true \
            -v /var/run/docker.sock:/var/run/docker.sock \
            lacework/lacework-inline-scanner:latest \
            image evaluate $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG \
            --build-id ${GITHUB_RUN_ID}-post \
            --build-plan github-actions \
            --save
